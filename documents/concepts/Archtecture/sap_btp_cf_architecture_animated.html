<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAP BTP CF Architecture – Animated</title>
<style>
  :root{
    --bg:       #08090f;
    --bg2:      #0f1018;
    --bg3:      #14152a;
    --border:   #2a2b3d;
    --text:     #e2e0f0;
    --muted:    #7875a0;
    --dim:      #3d3c55;

    --gold:     #d4a017;
    --blue:     #3b82f6;
    --blue-b:   #60a5fa;
    --blue-dim: #1e3a5f;
    --emerald:  #10b981;
    --emerald-b:#34d399;
    --violet:   #a78bfa;
    --violet-d: #7c3aed;
    --teal:     #14b8a6;
    --cyan:     #22d3ee;
    --amber:    #fbbf24;
    --orange:   #fb923c;
    --red:      #f87171;

    --panel-r:  420px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 12px 40px;
  }

  /* ── Header ── */
  header{
    text-align:center;
    margin-bottom:14px;
    width:100%;
    max-width:1320px;
  }
  header h1{
    font-size:15px;
    font-weight:600;
    background:linear-gradient(90deg,var(--blue-b),var(--violet),var(--amber));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    letter-spacing:.05em;
  }
  header p{font-size:11px;color:var(--muted);margin-top:3px}

  /* ── Main two-column layout ── */
  .layout{
    display:flex;
    gap:16px;
    width:100%;
    max-width:1320px;
    align-items:flex-start;
  }

  /* LEFT column */
  .left-col{
    flex:1 1 0;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .stage-nav{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
  .stage-dot{width:10px;height:10px;border-radius:50%;background:var(--dim);border:none;cursor:pointer;transition:background .2s,transform .2s;padding:0}
  .stage-dot.active{background:var(--blue-b);transform:scale(1.4)}
  .stage-label{font-size:11px;color:var(--muted);text-align:center;min-height:16px}

  #canvas{width:100%;position:relative}
  #canvas svg{width:100%;height:auto;display:block}

  /* key hint */
  .key-hint{display:flex;gap:8px;justify-content:center;align-items:center}
  .key{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:7px;
    border:1.5px solid var(--dim);
    color:var(--muted);font-size:15px;cursor:pointer;
    transition:all .12s;user-select:none;
    background:transparent;
  }
  .key.pressed{background:var(--blue-b);border-color:var(--blue-b);color:#04172e;transform:scale(.88)}
  .key-hint span{font-size:11px;color:var(--dim)}

  /* RIGHT column */
  .right-col{
    width:var(--panel-r);
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    gap:12px;
    height:fit-content;
  }

  .panel{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
  }
  .panel-header{
    padding:9px 14px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:7px;
  }
  .panel-body{
    padding:14px;
    overflow-y:auto;
  }

  /* Info panel (top right) */
  #info-panel{min-height:200px;max-height:280px}
  #info-panel .panel-header{background:linear-gradient(90deg,#1a1040,#0d1f3c);color:var(--violet)}
  #info-panel .panel-body{max-height:230px}
  .info-placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:160px;color:var(--dim);font-size:11px;gap:8px;
  }
  .info-placeholder svg{opacity:.3}
  .info-title{font-size:14px;font-weight:700;margin-bottom:8px;line-height:1.3}
  .info-desc{font-size:11px;color:#a8a5c8;line-height:1.7;margin-bottom:10px}
  .info-tag{
    display:inline-block;
    padding:2px 8px;border-radius:20px;
    font-size:10px;font-weight:600;
    margin:2px 2px 2px 0;
  }
  .info-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
  .info-table th{
    background:#1a1630;color:var(--violet);padding:5px 8px;
    text-align:left;font-weight:600;border-bottom:1px solid #2d2850;
  }
  .info-table td{
    padding:5px 8px;border-bottom:1px solid #1a1a2e;color:#c4c0e8;vertical-align:top;
  }
  .info-table tr:last-child td{border-bottom:none}
  .badge{
    display:inline-block;padding:1px 6px;border-radius:4px;
    font-size:9px;font-weight:700;letter-spacing:.05em;
    vertical-align:middle;margin-left:4px;
  }

  /* Steps panel (bottom right) */
  #steps-panel{min-height:260px}
  #steps-panel .panel-header{background:linear-gradient(90deg,#0d1f10,#0d1f3c);color:var(--emerald-b)}
  #steps-panel .panel-body{max-height:480px;overflow-y:auto}
  .step-item{
    display:flex;gap:10px;padding:8px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background .15s;
    border-radius:6px;
    padding:7px 8px;
  }
  .step-item:hover{background:#1a1b2e}
  .step-item.active{background:#111828;border-left:3px solid var(--blue-b);padding-left:10px}
  .step-num{
    min-width:22px;height:22px;border-radius:50%;
    background:var(--dim);color:#09090e;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;flex-shrink:0;
    transition:background .2s;
  }
  .step-item.active .step-num{background:var(--blue-b)}
  .step-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px}
  .step-desc{font-size:10px;color:var(--muted);line-height:1.6}

  /* ── SVG layer animations ── */
  .layer{transition:opacity .5s}
  .layer.hidden{opacity:0;pointer-events:none}
  @keyframes dash-flow{to{stroke-dashoffset:-20}}
  @keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes packet-down{0%{cy:0;opacity:1}85%{opacity:.8}100%{cy:46px;opacity:0}}
  @keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 2px transparent)}50%{filter:drop-shadow(0 0 10px #60a5fa66)}}
  @keyframes xsuaa-pulse{0%,100%{filter:drop-shadow(0 0 2px transparent)}50%{filter:drop-shadow(0 0 12px #a78bfa88)}}
  @keyframes float-up{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-42px);opacity:0}}
  @keyframes float-down{0%{transform:translateY(0);opacity:1}100%{transform:translateY(42px);opacity:0}}
  @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

  .flow-line{stroke-dasharray:6 4;animation:dash-flow 1s linear infinite}
  .flow-line-slow{stroke-dasharray:6 4;animation:dash-flow 1.8s linear infinite}
  .fade-up{animation:fade-up .5s ease forwards}
  .pkt-down{animation:float-down 1.2s ease-in-out infinite}
  .pkt-up{animation:float-up 1.2s ease-in-out infinite}
  .glow-box{animation:glow-pulse 2s ease-in-out infinite}
  .xsuaa-glow{animation:xsuaa-pulse 1.5s ease-in-out infinite}

  /* Clickable SVG elements */
  .clickable{cursor:pointer;transition:filter .2s}
  .clickable:hover rect,.clickable:hover .box-rect{filter:brightness(1.25)}

  /* ── Image section ── */
  .img-section{
    width:100%;max-width:1320px;
    margin-top:20px;
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    background:var(--bg2);
  }
  .img-toggle{
    width:100%;padding:11px 18px;
    background:var(--bg3);
    border:none;color:var(--text);
    font-family:inherit;font-size:12px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;gap:8px;
    letter-spacing:.04em;
    transition:background .2s;
  }
  .img-toggle:hover{background:#1e1f35}
  .img-toggle .arrow{margin-left:auto;transition:transform .25s;font-size:14px;color:var(--muted)}
  .img-toggle .arrow.open{transform:rotate(180deg)}
  .img-body{
    padding:14px;
    display:flex;flex-direction:column;gap:12px;
  }
  .upload-btn{
    display:inline-flex;align-items:center;gap:7px;
    padding:8px 16px;border-radius:8px;
    border:1.5px dashed var(--violet-d);
    color:var(--violet);font-size:11px;font-weight:600;
    cursor:pointer;transition:all .2s;width:fit-content;
    font-family:inherit;
  }
  .upload-btn:hover{background:#1a1040;border-color:var(--violet)}
  .img-grid{
    display:flex;flex-wrap:wrap;gap:10px;
  }
  .img-thumb-wrap{
    position:relative;width:120px;height:90px;
    border-radius:8px;overflow:hidden;
    border:1.5px solid var(--border);
    cursor:pointer;transition:transform .2s,border-color .2s;
    flex-shrink:0;
  }
  .img-thumb-wrap:hover{transform:scale(1.04);border-color:var(--blue-b)}
  .img-thumb-wrap img{width:100%;height:100%;object-fit:cover}
  .img-thumb-wrap .img-overlay{
    position:absolute;inset:0;background:#00000088;
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;font-size:18px;
  }
  .img-thumb-wrap:hover .img-overlay{opacity:1}
  .no-images{font-size:11px;color:var(--dim);text-align:center;padding:20px}
  .img-count{font-size:10px;color:var(--muted);margin-left:auto}

  /* scrollbar */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

  @media(max-width:900px){
    .layout{flex-direction:column}
    .right-col{width:100%;--panel-r:100%}
  }
</style>
</head>
<body>

<header>
  <h1>SAP BTP Subaccount · CF Environment &amp; CPI Tenant Architecture</h1>
  <p>Interactive step-by-step walkthrough · Click any component for details</p>
</header>

<div class="layout">

  <!-- ═══════════════ LEFT: Diagram ═══════════════ -->
  <div class="left-col">
    <div class="stage-nav" id="dots"></div>
    <div class="stage-label" id="stage-label"></div>

    <div id="canvas">
    <svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arr-violet" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
        <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-linecap="round"/>
        </marker>

        <!-- Glow filters -->
        <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-violet" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- ── Layer 0: BTP Subaccount (always visible) ── -->
      <g id="l-btp" class="layer clickable" onclick="showInfo('btp')">
        <rect x="20" y="16" width="640" height="548" rx="20"
          fill="#0d0e14" stroke="#d4a017" stroke-width="1.2"/>
        <text x="340" y="44" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="13" font-weight="700" fill="#d4a017" letter-spacing=".08em">SAP BTP SUBACCOUNT</text>
      </g>

      <!-- ── Layer 1: CF Environment ── -->
      <g id="l-cf" class="layer hidden clickable" onclick="showInfo('cf')">
        <rect x="46" y="60" width="588" height="328" rx="14"
          fill="#050e1f" stroke="#3b82f6" stroke-width="1.2"/>
        <text x="340" y="87" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="12" font-weight="700" fill="#60a5fa" letter-spacing=".06em">CF ENVIRONMENT</text>
        <text x="340" y="104" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="10" fill="#3b6ea8">Open-source PaaS runtime · 1 org per subaccount</text>
      </g>

      <!-- ── Layer 2: CF Service Instances ── -->
      <g id="l-svc" class="layer hidden">
        <rect x="68" y="118" width="544" height="126" rx="10"
          fill="#021a0e" stroke="#10b981" stroke-width="1"/>
        <text x="340" y="142" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="11" font-weight="700" fill="#34d399" letter-spacing=".05em">CF SERVICE INSTANCES</text>

        <!-- XSUAA pill -->
        <g id="pill-xsuaa" class="clickable" onclick="event.stopPropagation();showInfo('xsuaa')">
          <rect x="84" y="152" width="158" height="80" rx="9"
            fill="#0f0a2e" stroke="#a78bfa" stroke-width="1.2"/>
          <text x="163" y="175" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="12" font-weight="700" fill="#c4b5fd">XSUAA</text>
          <text x="163" y="191" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="9" fill="#8b78d0">OAuth 2.0 / OIDC server</text>
          <!-- auth method chips -->
          <rect x="88" y="200" width="72" height="14" rx="4" fill="#1e1040"/>
          <text x="124" y="211" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="8" fill="#a78bfa">Client Creds</text>
          <rect x="166" y="200" width="72" height="14" rx="4" fill="#1e1040"/>
          <text x="202" y="211" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="8" fill="#a78bfa">JWT Bearer</text>
          <!-- hover hint -->
          <text x="163" y="228" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="8" fill="#534AB7">+3 more auth methods ↗</text>
        </g>

        <!-- Destination pill -->
        <g id="pill-dest" class="clickable" onclick="event.stopPropagation();showInfo('dest')">
          <rect x="258" y="152" width="148" height="80" rx="9"
            fill="#011a15" stroke="#14b8a6" stroke-width="1"/>
          <text x="332" y="175" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="12" font-weight="700" fill="#5eead4">Destination</text>
          <text x="332" y="191" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="9" fill="#3d9c80">Remote connection configs</text>
          <text x="332" y="208" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="9" fill="#0e7a6a">URL · Auth · Proxy</text>
          <text x="332" y="225" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="8" fill="#14b8a6">lookup by name →</text>
        </g>

        <!-- Connectivity pill -->
        <g id="pill-conn" class="clickable" onclick="event.stopPropagation();showInfo('conn')">
          <rect x="420" y="152" width="178" height="80" rx="9"
            fill="#011a20" stroke="#22d3ee" stroke-width="1"/>
          <text x="509" y="175" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="12" font-weight="700" fill="#67e8f9">Connectivity</text>
          <text x="509" y="191" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="9" fill="#3a9db0">On-premise access</text>
          <text x="509" y="208" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="9" fill="#1a7a8c">Cloud Connector tunnel</text>
          <text x="509" y="225" text-anchor="middle" font-family="IBM Plex Mono,monospace"
            font-size="8" fill="#22d3ee">RFC · HTTP · LDAP →</text>
        </g>
      </g>

      <!-- ── Layer 3: Arrow svc→apps (auth/bind) ── -->
      <g id="l-arrow1" class="layer hidden">
        <line x1="340" y1="244" x2="340" y2="278" stroke="#60a5fa" stroke-width="1.5"
          marker-end="url(#arr-blue)" class="flow-line"/>
        <text x="348" y="266" font-family="IBM Plex Mono,monospace"
          font-size="9" fill="#3b82f6">auth / bind</text>
        <circle cx="340" cy="248" r="4" fill="#60a5fa" class="pkt-down" opacity=".9"/>
      </g>

      <!-- ── Layer 4: Custom CF Apps ── -->
      <g id="l-apps" class="layer hidden clickable" onclick="event.stopPropagation();showInfo('apps')">
        <rect x="68" y="278" width="544" height="98" rx="10"
          fill="#1c1100" stroke="#f59e0b" stroke-width="1.8"/>
        <text x="340" y="304" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="12" font-weight="700" fill="#fde68a" letter-spacing=".04em">YOUR CUSTOM CF APPS</text>
        <text x="340" y="322" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="10" fill="#d4920a">Java · Node.js · Python · Go · community buildpacks</text>
        <text x="340" y="340" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="10" fill="#a06a10">Microservices · Extensions · OData services · Open Connectors</text>
        <text x="340" y="358" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="9" fill="#6b4a18">credentials injected via VCAP_SERVICES env var</text>
      </g>

      <!-- ── Layer 5: 3-arrow auth+communicate flow ── -->
      <g id="l-arrow2" class="layer hidden">

        <!-- ① Apps → XSUAA: get Bearer token (up-left) -->
        <line x1="120" y1="278" x2="120" y2="234" stroke="#a78bfa" stroke-width="2"
          marker-end="url(#arr-violet)" class="flow-line-slow"/>
        <circle cx="120" cy="274" r="5" fill="#a78bfa" class="pkt-up" opacity=".95"/>
        <!-- label background -->
        <rect x="28" y="249" width="88" height="18" rx="4" fill="#1e1040" opacity=".9"/>
        <text x="72" y="261" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="9" font-weight="600" fill="#c4b5fd">① get token</text>
        <!-- XSUAA glow ring -->
        <rect x="84" y="152" width="158" height="80" rx="9"
          fill="none" stroke="#a78bfa" stroke-width="2.5" class="xsuaa-glow" opacity=".8"/>

        <!-- ② Apps → Destination: get iFlow URL (up-right) -->
        <line x1="332" y1="278" x2="332" y2="234" stroke="#14b8a6" stroke-width="2"
          marker-end="url(#arr-teal)" class="flow-line-slow"/>
        <circle cx="332" cy="274" r="5" fill="#14b8a6" class="pkt-up" opacity=".95" style="animation-delay:.6s"/>
        <!-- label background -->
        <rect x="338" y="249" width="100" height="18" rx="4" fill="#011a15" opacity=".9"/>
        <text x="388" y="261" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="9" font-weight="600" fill="#5eead4">② get iFlow URL</text>
        <!-- Destination glow ring -->
        <rect x="258" y="152" width="148" height="80" rx="9"
          fill="none" stroke="#14b8a6" stroke-width="2.5" class="xsuaa-glow" opacity=".7"/>

        <!-- ③ Apps → CPI: auth + communicate (down-center) -->
        <line x1="340" y1="376" x2="340" y2="426" stroke="#60a5fa" stroke-width="2.5"
          marker-end="url(#arr-blue)" class="flow-line"/>
        <circle cx="340" cy="380" r="5" fill="#60a5fa" class="pkt-down" opacity=".95" style="animation-delay:.3s"/>
        <!-- label background -->
        <rect x="348" y="390" width="148" height="30" rx="4" fill="#0d1f3c" opacity=".95"/>
        <text x="422" y="403" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="9" font-weight="700" fill="#93c5fd">③ auth + communicate</text>
        <text x="422" y="416" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="8" fill="#60a5fa">Bearer token + iFlow endpoint</text>

      </g>

      <!-- ── Layer 6: CPI Tenant ── -->
      <g id="l-cpi" class="layer hidden clickable" onclick="event.stopPropagation();showInfo('cpi')">
        <rect x="46" y="428" width="588" height="118" rx="14"
          fill="#1e0d00" stroke="#f97316" stroke-width="2"/>
        <text x="340" y="456" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="12" font-weight="700" fill="#fed7aa" letter-spacing=".05em">INTEGRATION SUITE / CPI TENANT</text>
        <text x="340" y="474" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="10" fill="#ea8040">Design time · Runtime (TMN + worker nodes) · Monitoring</text>
        <text x="340" y="492" text-anchor="middle" font-family="IBM Plex Mono,monospace"
          font-size="10" fill="#b05828">iFlow execution · Keystore · Credentials · Message logs</text>

/* ═══ STATE ═══ */
let current = 0;

/* ═══ INIT ═══ */
const dotsEl   = document.getElementById('dots');
const labelEl  = document.getElementById('stage-label');
const stepsEl  = document.getElementById('steps-list');
const keyL     = document.getElementById('key-l');
const keyR     = document.getElementById('key-r');

// Build dots
STEPS.forEach((_,i)=>{
  const d = document.createElement('button');
  d.className='stage-dot';
  d.title='Step '+(i+1);
  d.onclick=()=>goTo(i);
  dotsEl.appendChild(d);
});

// Build steps list (always visible)
STEPS.forEach((s,i)=>{
  const el = document.createElement('div');
  el.className='step-item';
  el.id='step-item-'+i;
  el.onclick=()=>goTo(i);
  el.innerHTML=`
    <div class="step-num">${i+1}</div>
    <div>
      <div class="step-title">${s.label}</div>
      <div class="step-desc">${s.desc}</div>
    </div>`;
  stepsEl.appendChild(el);
});

function goTo(idx){
  current = Math.max(0, Math.min(STEPS.length-1, idx));
  render();
}

function render(){
  const step = STEPS[current];
  // dots
  document.querySelectorAll('.stage-dot').forEach((d,i)=>d.classList.toggle('active', i===current));
  // label
  labelEl.textContent = `${current+1} / ${STEPS.length}  ·  ${step.label}`;
  // layers
  document.querySelectorAll('.layer').forEach(el=>el.classList.add('hidden'));
  // BTP always visible
  document.getElementById('l-btp').classList.remove('hidden');
  step.show.forEach(id=>{
    const el=document.getElementById(id);
    if(!el) return;
    el.classList.remove('hidden');
    el.classList.remove('fade-up');
    void el.offsetWidth;
    el.classList.add('fade-up');
  });
  // steps list highlight
  document.querySelectorAll('.step-item').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
    if(i===current) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}

function showInfo(key){
  const d = INFO[key];
  if(!d) return;
  const body = document.getElementById('info-body');
  body.innerHTML = `
    <div class="info-title" style="color:${d.color}">${d.title}</div>
    <div class="info-desc">${d.desc}</div>
    <div style="margin-bottom:8px">${(d.tags||[]).map(t=>`<span class="info-tag" style="background:${t.c};color:${t.tc}">${t.t}</span>`).join('')}</div>
    ${d.extra || ''}
  `;
}

function flashKey(el){
  el.classList.add('pressed');
  setTimeout(()=>el.classList.remove('pressed'),160);
}
keyL.onclick=()=>{flashKey(keyL);goTo(current-1)};
keyR.onclick=()=>{flashKey(keyR);goTo(current+1)};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='n'||e.key==='N'){flashKey(keyR);goTo(current+1)}
  if(e.key==='ArrowLeft'||e.key==='p'||e.key==='P'){flashKey(keyL);goTo(current-1)}
});

/* ═══ IMAGE SECTION ═══ */
let imgOpen = false;
let imgCount = 0;
function toggleImages(){
  imgOpen = !imgOpen;
  document.getElementById('img-body').style.display = imgOpen ? 'flex' : 'none';
  document.getElementById('img-arrow').classList.toggle('open', imgOpen);
}

function handleUpload(e){
  const files = Array.from(e.target.files);
  const grid = document.getElementById('img-grid');
  const noMsg = document.getElementById('no-images-msg');
  if(noMsg) noMsg.remove();

  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      imgCount++;
      document.getElementById('img-count').textContent = imgCount+' image'+(imgCount===1?'':'s');
      const url = ev.target.result;
      const wrap = document.createElement('div');
      wrap.className='img-thumb-wrap';
      wrap.title='Click to open full size';
      wrap.onclick=()=>{
        const win=window.open();
        win.document.write(`<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${url}" style="max-width:100%;max-height:100vh;object-fit:contain"/></body></html>`);
      };
      wrap.innerHTML=`<img src="${url}" alt="${file.name}"/>
        <div class="img-overlay">🔍</div>`;
      grid.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

/* Init */
render();
</script>
