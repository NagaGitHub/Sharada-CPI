<title>SSH &amp; HTTPS — How Files Travel Securely</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d1117;color:#e6edf3;font-family:sans-serif;overflow:hidden}

#main{display:flex;height:calc(100vh - 41px);overflow:hidden}

#diagram-area{flex:0 0 56%;min-width:280px;display:flex;flex-direction:column;overflow:hidden;position:relative}
#diagram-toolbar{display:flex;align-items:center;gap:8px;padding:5px 12px;background:#0d1117;border-bottom:1px solid #30363d;flex-shrink:0}
.toolbar-pill{display:flex;border:1px solid #30363d;border-radius:20px;overflow:hidden}
.t-seg{padding:3px 11px;font-size:11px;cursor:pointer;color:#8b949e;background:#161b22;user-select:none;transition:all .12s}
.t-seg:hover{color:#e6edf3}
.t-seg.active{background:#0a2a1e;color:#4fc98f}
#toolbar-label{font-size:11px;color:#8b949e}
#zoom-bar{position:absolute;top:38px;right:10px;z-index:20;display:flex;align-items:center;gap:4px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:3px 7px}
#zoom-pct{font-size:10px;color:#8b949e;min-width:32px;text-align:center}
.zbtn{background:none;border:none;color:#8b949e;cursor:pointer;font-size:13px;padding:0 2px;line-height:1}
.zbtn:hover{color:#e6edf3}
#diagram-scroll{flex:1;overflow:auto;position:relative;padding:14px}
#diagram-scroll::-webkit-scrollbar{width:7px;height:7px}
#diagram-scroll::-webkit-scrollbar-track{background:#161b22}
#diagram-scroll::-webkit-scrollbar-corner{background:#161b22}
#diagram-scroll::-webkit-scrollbar-thumb:vertical{background:#1d6e5a;border-radius:3px}
#diagram-scroll::-webkit-scrollbar-thumb:vertical:hover{background:#1d9e75}
#diagram-scroll::-webkit-scrollbar-thumb:horizontal{background:#185fa5;border-radius:3px}

#detail-area{flex:1;min-width:280px;display:flex;flex-direction:column;overflow:hidden;padding:10px 10px 0 0}

#det-badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;margin-bottom:7px;background:#30363d;color:#8b949e}
#det-title{font-size:17px;font-weight:700;color:#e6edf3;margin-bottom:3px}
#det-sub{font-size:11px;color:#8b949e}

#det-body{flex:1;overflow-y:auto;padding:12px 14px;min-height:0}
#det-body::-webkit-scrollbar{width:5px}
#det-body::-webkit-scrollbar-track{background:#161b22}
#det-body::-webkit-scrollbar-thumb{background:#4a9ee6;border-radius:3px}
#det-body::-webkit-scrollbar-thumb:hover{background:#7ba7ff}

.dsec{margin-bottom:14px}
.dsec-title{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.desc-text{font-size:12.5px;color:#c9d1d9;line-height:1.75}
.desc-text em{color:#e6edf3;font-style:normal;font-weight:600}

/* sample data box */
.sample-box{background:#0d1f12;border:1px solid #1d4a28;border-radius:7px;padding:10px 12px;margin-top:8px;font-size:11.5px;line-height:1.7}

.sample-line{color:#c9d1d9;margin-bottom:2px}

.sample-line .val{color:#e6edf3;font-family:monospace;font-size:11px}

.sample-line .val.amber{color:#fac775}
.sample-line .val.blue{color:#85b7eb}
.sample-line .val.red{color:#f09595}
.sample-line .val.teal{color:#5dcaa5}
.sample-line .val.muted{color:#8b949e}
.sample-check{color:#97c459;font-weight:700}
.sample-warn{color:#fac775;font-weight:700}

.dcard{border-radius:6px;padding:8px 11px;margin-bottom:5px;font-size:11.5px;line-height:1.55;color:#c9d1d9}
.dcard.out{border-left:3px solid #3b6d11;background:#0a1a04}
.dcard.inp{border-left:3px solid #185fa5;background:#04112a}
.dcard.note{border-left:3px solid #ba7517;background:#2a1500;color:#e6c680;font-size:12px;line-height:1.65}

#steps-panel{border-top:1px solid #30363d;flex-shrink:0;padding:10px 14px;background:#0d1a12;max-height:40%}
#steps-panel-title{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
#steps-list{overflow-y:auto;max-height:calc(100% - 22px)}
#steps-list::-webkit-scrollbar{width:4px}
#steps-list::-webkit-scrollbar-track{background:#0d1a12}

#steps-list::-webkit-scrollbar-thumb:hover{background:#f0a442}
.spill{display:flex;align-items:flex-start;gap:7px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:11px;color:#8b949e;transition:background .1s;margin-bottom:2px}
.spill:hover{background:#152010;color:#c9d1d9}
.spill.active{background:#0a2a1e;color:#e6edf3}
.sbadge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:15px;border-radius:3px;font-size:8px;font-weight:700;color:#fff;padding:0 3px;flex-shrink:0;margin-top:1px}

#img-section{padding:6px 10px 6px 0;flex-shrink:0}
.img-toggle-btn{background:none;border:1px solid #30363d;color:#8b949e;font-size:11px;padding:2px 9px;border-radius:4px;cursor:pointer}
.img-toggle-btn:hover{border-color:#e6edf3;color:#e6edf3}
#img-area{margin-top:6px}
#img-gallery{display:flex;flex-wrap:wrap;gap:6px;max-height:100px;overflow-y:auto}
#img-gallery img{height:72px;border-radius:4px;cursor:pointer;border:1px solid #30363d;object-fit:cover}
#img-gallery img:hover{border-color:#1d9e75}
#img-upload{margin-top:5px}
#img-upload input{font-size:11px;color:#8b949e}
</style>

<body>

  <button class="tab-btn active" data-tab="ssh" onclick="switchTab('ssh')">&#x1F510; SSH — Secure File Transfer</button>
  <button class="tab-btn" data-tab="https" onclick="switchTab('https')">&#x1F310; HTTPS — Safe Online Shopping</button>
</div>

<div id="main">
  <div id="diagram-area">
    <div id="diagram-toolbar">
      <div class="toolbar-pill">
        <div class="t-seg" id="seg-exp" onclick="setView('expand')">&#8592; Detailed</div>
        <div class="t-seg active" id="seg-col" onclick="setView('collapse')">Overview &#8594;</div>
      </div>
      <span id="toolbar-label">Overview</span>
    </div>
    <div id="zoom-bar">
      <button class="zbtn" onclick="applyZoom(-0.15)">&#xFF0D;</button>

      <button class="zbtn" onclick="applyZoom(+0.15)">&#xFF0B;</button>

    </div>
    <div id="diagram-scroll"><div id="canvas"></div></div>

  <div id="resizer"></div>

  <div id="detail-area">

      <div id="det-header">
        <div id="det-badge">Select a step</div>

      </div>
      <div id="det-body">
        <div style="display:flex;align-items:center;justify-content:center;height:140px;color:#8b949e;font-size:13px;flex-direction:column;gap:8px">
          <span style="font-size:22px">&#x1F446;</span>
          <span>Click any step in the diagram</span>

      <button class="img-toggle-btn" onclick="toggleImgs()">&#x1F4CE; Images &#9660;</button>

        <div id="img-upload"><input type="file" accept="image/*" multiple onchange="addImgs(this)"></div>
      </div>

</div>

<script>
// ─── Sample scenario labels ───
// SSH:   Sarah uploads Q3_report.pdf to files.company.com
// HTTPS: Alex buys a book on bookshop.com

var DATA = {
  ssh: {
    color:'#0f6e56', colorLight:'#1d9e75', fillSel:'#0a2a1e', prefix:'S',
    steps:[
      // ── S0 ─────────────────────────────────────────
      {
        id:'s0', badge:'S0',
        title:'Server Gets a Permanent ID Badge (One-Time Setup)',
        subtitle:'Happens once when the server is first set up — not during your transfer',
        role:'One-time setup — before you ever connect',
        description:'Long before Sarah tries to transfer her file, someone set up the company server. During that setup, the server created two things: a <em>private key</em> (like a special pen — stays locked on the server forever, never shared) and a <em>public key</em> (like an official stamp anyone can verify). The public key is condensed into a short fingerprint — a unique identity number for that server. The first time Sarah ever connects, SSH shows her that fingerprint and asks her to confirm it is the right server. She says yes, and SSH notes it down in a trusted contact book on her laptop. Every future connection silently checks the fingerprint against that note — if it ever changes, SSH stops and warns her.',
        sample:'<div class="sample-title">&#x1F4CB; Example — What gets stored on first connection</div>'
          +'<div class="sample-line"><span class="lbl">Server address: </span><span class="val">files.company.com</span></div>'
          +'<div class="sample-line"><span class="lbl">Key type: </span><span class="val">Ed25519</span></div>'
          +'<div class="sample-line"><span class="lbl">Fingerprint stored: </span><span class="val green">SHA256:uNiVztks+CsDhcc0u9e8BujQXVUpKZIDTMczCvj3tD2s</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="lbl">Contact book entry (known_hosts): </span></div>'
          +'<div class="sample-line"><span class="val muted">files.company.com ssh-ed25519 AAAAC3Nza...uNiVztks</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="sample-check">&#10003;</span><span class="lbl"> Future connections: fingerprint checked silently every time</span></div>'
          +'<div class="sample-line"><span class="sample-warn">&#9888;</span><span class="lbl"> Fingerprint changed? SSH stops immediately and warns Sarah</span></div>',
        sends:[],
        receives:[],
        produces:'Server has a permanent identity. Sarah\'s laptop has the fingerprint saved. All future connections will be silently verified against it.',
        note:'Think of this like writing down a shop\'s phone number in your contacts the first time you call them. Next time you ring, your phone confirms it is the same number before connecting.'
      },
      // ── S1 ─────────────────────────────────────────
      {
        id:'s1', badge:'S1',
        title:'Agree on the Rules',
        subtitle:'Sarah\'s laptop and the server decide how they will talk securely',
        role:'Setup — nothing secret yet',
        description:'Sarah opens her file transfer app and connects to files.company.com. Before anything secure happens, both sides introduce themselves and swap lists of every security method they support — like two offices calling each other: <em>"Which courier company do we both trust? What kind of lock do you accept?"</em> They pick the best option both sides know. Nothing is hidden yet — this part of the conversation is in the open.',
        sample:'<div class="sample-title">&#x1F4CB; Example — What they say to each other</div>'
          +'<div class="sample-line"><span class="lbl">Sarah\'s laptop: </span><span class="val green">"I\'m OpenSSH 9.4. I support: curve25519 key exchange, Ed25519 keys, AES-256 encryption."</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="lbl">Server replies: </span><span class="val blue">"I\'m OpenSSH 8.9. I support those too — let\'s use curve25519 + Ed25519 + AES-256."</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="sample-check">&#10003;</span><span class="lbl"> Agreed rulebook saved by both sides (used to detect tampering in step S3)</span></div>',
        sends:['Greeting + list of supported security methods'],
        receives:['Server\'s greeting + its list of supported security methods'],
        produces:'Agreed rulebook: curve25519 key exchange, Ed25519 host keys, AES-256 encryption. Saved by both sides.',
        note:'If someone tried to swap a weaker method into this list, it would be detected in Step S3 — both sides keep a full record of this conversation and cross-check it later.'
      },
      // ── S2 ─────────────────────────────────────────
      {
        id:'s2', badge:'S2',
        title:'Create a Shared Secret — Without Saying It Out Loud',
        subtitle:'Both arrive at the same lock combination without ever sending it',
        role:'The magic key exchange',
        description:'This is the cleverest part. Imagine you and a friend want to agree on a secret colour, but you are in a room full of strangers who can hear everything. Each of you picks a secret colour privately, mixes it with a shared public colour, and you swap only the mixed results. Then each of you adds your own secret back into what you received — and you both end up with the exact same final colour, <em>without ever saying your secret out loud</em>. Anyone listening heard only the mixed colours — useless without the secret ingredient. Sarah\'s laptop and the server do the exact same thing with numbers.',
        sample:'<div class="sample-title">&#x1F3A8; Colour-mix example (simplified)</div>'
          +'<div class="sample-line"><span class="lbl">Public colour (everyone sees): </span><span class="val amber">Yellow</span></div>'
          +'<div class="sample-line"><span class="lbl">Sarah\'s secret colour: </span><span class="val blue">Blue</span>&nbsp;&nbsp;<span class="val muted">(stays on her laptop — never sent)</span></div>'
          +'<div class="sample-line"><span class="lbl">Sarah mixes Blue+Yellow, sends: </span><span class="val green">Green &#8594; server</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="lbl">Server\'s secret colour: </span><span class="val red">Red</span>&nbsp;&nbsp;<span class="val muted">(stays on server — never sent)</span></div>'
          +'<div class="sample-line"><span class="lbl">Server mixes Red+Yellow, sends: </span><span class="val amber">Orange &#8594; Sarah</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="lbl">Sarah takes Orange + Blue = </span><span class="val teal">Brown (shared secret)</span></div>'
          +'<div class="sample-line"><span class="lbl">Server takes Green + Red = </span><span class="val teal">Brown (same result!)</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="lbl">Eavesdropper saw: Yellow, Green, Orange — </span><span class="val red">cannot compute Brown.</span></div>',
        sends:['Sarah\'s "mixed colour" — her public half of the key exchange'],
        receives:['Server\'s "mixed colour" + server\'s ID badge + a signed document'],
        produces:'Both sides independently know the shared secret (Brown). It was never transmitted. Nobody in between has it.',
        note:'Best-case bonus: the shared secret is thrown away once this session ends. Even if someone recorded every byte today and stole the server\'s keys later — they still cannot unlock this session. The secret is gone.'
      },
      // ── S3 ─────────────────────────────────────────
      {
        id:'s3', badge:'S3',
        title:'Server Shows Its ID Badge — and Signs a Document',
        subtitle:'The server proves it is the real server, not an imposter',
        role:'Server identity proof',
        description:'The server now needs to prove it is genuinely files.company.com and not a fake. It sends its public ID badge (the key created in S0). Then it <em>signs a unique document</em> that references everything that has happened in this connection so far — including the shared secret from S2. The signature can only be made by whoever holds the server\'s private key. It is like the destination office sending back their official stamp along with a signed letter that mentions today\'s specific delivery reference.',
        sample:'<div class="sample-title">&#x1F4CB; Example — What the server sends</div>'
          +'<div class="sample-line"><span class="lbl">ID badge (public key): </span><span class="val muted">ssh-ed25519 AAAAC3NzaC1lZDI1NTE5...uNiVztks</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="lbl">Signed document covers: </span></div>'
          +'<div class="sample-line"><span class="val muted">&nbsp;&#8226; Agreed rules from S1 (curve25519, Ed25519, AES-256)</span></div>'
          +'<div class="sample-line"><span class="val muted">&nbsp;&#8226; Sarah\'s mix (Green) + Server\'s mix (Orange)</span></div>'
          +'<div class="sample-line"><span class="val muted">&nbsp;&#8226; Shared secret (Brown)</span></div>'
          +'<div class="sample-line"><span class="val muted">&nbsp;&#8226; Connection ref: #8472</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="lbl">Signature (made with server\'s private key): </span><span class="val green">3aF9kP2mQr7...</span></div>',
        sends:['Server\'s public ID badge', 'Signed document covering this entire connection so far'],
        receives:['Nothing — server is doing the proving here'],
        produces:'A signed document Sarah\'s laptop can verify in the next step.',
        note:'The signed document covers the shared secret from S2. A fake server would need to forge a signature that includes a secret they cannot know — impossible without the real server\'s private key.'
      },
      // ── S4 ─────────────────────────────────────────
      {
        id:'s4', badge:'S4',
        title:'Sarah\'s Laptop Checks the ID Badge',
        subtitle:'Fingerprint verified against the contact book — then signature checked',
        role:'Trust check — your computer\'s job',
        description:'Sarah\'s laptop does two checks automatically. First, it takes the fingerprint of the received ID badge and looks it up in the contact book (from S0). Second, it verifies the signed document — confirming only the real server could have produced that signature. If either check fails, the connection drops immediately, before any file or password is ever sent. This is the moment the fake-server attack is caught.',
        sample:'<div class="sample-title">&#x1F50D; Example — What Sarah\'s laptop checks</div>'
          +'<div class="sample-line"><span class="lbl">Fingerprint of received badge: </span><span class="val green">SHA256:uNiVztks+CsDhcc0u9e8BujQXVUpKZIDTMczCvj3tD2s</span></div>'
          +'<div class="sample-line"><span class="lbl">Contact book entry: </span><span class="val green">SHA256:uNiVztks+CsDhcc0u9e8BujQXVUpKZIDTMczCvj3tD2s</span></div>'
          +'<div class="sample-line"><span class="sample-check">&#10003; Match</span><span class="lbl"> — same server Sarah connected to before</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="lbl">Signature check: </span><span class="val green">3aF9kP2mQr7...</span><span class="lbl"> verified with ID badge &#8594; </span><span class="sample-check">&#10003; Valid</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="sample-warn">&#9888; First-ever connection scenario:</span></div>'
          +'<div class="sample-line"><span class="val muted">"The authenticity of \'files.company.com\' can\'t be established.</span></div>'
          +'<div class="sample-line"><span class="val muted">&nbsp;Fingerprint: SHA256:uNiVztks... Are you sure? (yes/no)"</span></div>',
        sends:['Nothing — all verification happens privately on Sarah\'s laptop'],
        receives:['ID badge and signed document from S3'],
        produces:'Confirmed: this is the real files.company.com. Both sides share the same secret. Ready to lock the channel.',
        note:'This is why SSH warns loudly when a server\'s fingerprint changes unexpectedly. A different fingerprint could mean someone is pretending to be the server — so SSH stops before anything sensitive is sent.'
      },
      // ── S5 ─────────────────────────────────────────
      {
        id:'s5', badge:'S5',
        title:'Lock the Channel',
        subtitle:'Everything from this point is scrambled — unreadable to anyone in between',
        role:'Encryption switched on',
        description:'Both sides use the shared secret (Brown) from S2 to create session keys — unique lock-and-key pairs for this transfer only. Think of it as both offices sealing an armoured van with a combination that only they know. The doors click shut. From this moment, every byte that travels between Sarah\'s laptop and the server is scrambled into meaningless noise for anyone else watching — her internet provider, the office router, anyone on the network. The combination is fresh every session, so recordings from past transfers are useless.',
        sample:'<div class="sample-title">&#x1F511; Example — Keys created from the shared secret</div>'
          +'<div class="sample-line"><span class="lbl">Shared secret (Brown) + connection ref #8472 &#8594;</span></div>'
          +'<div class="sample-line"><span class="lbl">Key A (Sarah &#8594; server): </span><span class="val green">xK92mP4f-LqRt7wBn</span><span class="val muted"> (scrambles what Sarah sends)</span></div>'
          +'<div class="sample-line"><span class="lbl">Key B (server &#8594; Sarah): </span><span class="val blue">pL3nQr8j-VzMs2cDk</span><span class="val muted"> (scrambles what server sends back)</span></div>'
          +'<div class="sample-line" style="margin-top:6px"><span class="lbl">Sarah\'s laptop signals: </span><span class="val green">"Switching to encrypted mode now."</span></div>'
          +'<div class="sample-line"><span class="lbl">Server signals: </span><span class="val blue">"Received — switching too."</span></div>'
          +'<div class="sample-line" style="margin-top:4px"><span class="sample-check">&#10003;</span><span class="lbl"> Armoured van doors locked. Channel is live.</span></div>',
        sends:['"Switching to encrypted mode" signal'],
        receives:['"Switching too" signal from server'],
        produces:'Fully encrypted channel. Separate keys for each direction. Files are ready to travel safely.',
        note:'Separate keys per direction (A and B) mean that even a partial problem with one direction does not expose the other. Each key is unique to this session and discarded when it ends.'
      },
      // ── S6 ─────────────────────────────────────────
      {
        id:'s6', badge:'S6',
        title:'Sarah Proves Who She Is — Then the File Transfers',
        subtitle:'She shows her pass at the gate, the door opens, Q3_report.pdf moves',
        role:'Identity check + file transfer',
        description:'The channel is locked and the server is verified — but the server still needs to know <em>Sarah is authorised</em> to put files here. It is like arriving at a secure facility in the armoured van: the building is verified, the van is locked, but the guard at the gate still checks your ID before opening the door. Sarah proves her identity with either a <em>digital key card</em> (no password ever crosses the network) or a <em>password</em> sent safely inside the already-locked channel. Once confirmed, Q3_report.pdf travels scrambled through the channel, arriving intact at the server.',
        sample:'<div class="sample-title">&#x1F4CB; Example — Key card method (most secure)</div>'

// ─── State ───
var activeTab = 'ssh';
var selectedId = null;
var viewMode = 'collapse';
var zoomLevel = 1.0;
var imgExpanded = false;

// ─── Diagram ───
var BOX_W = 490, BOX_H_COL = 54, BOX_H_EXP = 92, GAP = 16, PAD = 18;

function renderDiagram() {
  var d = DATA[activeTab];
  var isExp = viewMode === 'expand';
  var BH = isExp ? BOX_H_EXP : BOX_H_COL;
  var SVG_H = PAD + d.steps.length * BH + (d.steps.length - 1) * GAP + PAD;
  var SVG_W = BOX_W + PAD * 2;

  var s = '<svg id="diag-svg" width="100%" viewBox="0 0 ' + SVG_W + ' ' + SVG_H + '" style="min-width:360px;display:block">';
  s += '<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">';
  s += '<path d="M2 2L8 5L2 8" fill="none" stroke="' + d.color + '" stroke-width="1.8" stroke-linecap="round"/>';
  s += '</marker></defs>';

  d.steps.forEach(function(step, i) {
    var x = PAD, y = PAD + i * (BH + GAP);
    var isSel = selectedId === step.id;
    // S0 gets a slightly different visual treatment (amber tint = one-time setup)
    var isSetup = step.id === 's0';
    var fill   = isSel ? d.fillSel : (isSetup ? '#1a1500' : '#161b22');
    var stroke = isSel ? d.colorLight : (isSetup ? '#ba7517' : d.color);
    var sw     = isSel ? 2 : (isSetup ? 1 : 0.75);

    if (i > 0) {
      var prevY = PAD + (i - 1) * (BH + GAP) + BH;
      var lineColor = (step.id === 's1' && DATA[activeTab].steps[0].id === 's0') ? '#ba7517' : d.color;
      s += '<line x1="' + (x + BOX_W/2) + '" y1="' + (prevY + 1) + '" x2="' + (x + BOX_W/2) + '" y2="' + (y - 5) + '"';
      s += ' stroke="' + d.color + '" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arr)" opacity="0.45"/>';
    }

    s += '<g onclick="selectStep(\'' + step.id + '\')" style="cursor:pointer">';
    s += '<rect x="' + x + '" y="' + y + '" width="' + BOX_W + '" height="' + BH + '" rx="8" fill="' + fill + '" stroke="' + stroke + '" stroke-width="' + sw + '"/>';

    var badgeColor = isSetup ? '#ba7517' : d.color;
    var bx = x + 10, by = y + BH/2 - 8;
    s += '<rect x="' + bx + '" y="' + by + '" width="22" height="15" rx="3" fill="' + badgeColor + '"/>';
    s += '<text x="' + (bx+11) + '" y="' + (by+7.5) + '" text-anchor="middle" dominant-baseline="central"';
    s += ' style="font-size:8px;font-weight:700;fill:#fff;font-family:sans-serif">' + step.badge + '</text>';

    var tx = x + 42;
    var ty1 = isExp ? y + 20 : y + BH/2 - 8;
    s += '<text x="' + tx + '" y="' + ty1 + '" dominant-baseline="central"';
    s += ' style="font-size:13px;font-weight:700;fill:#e6edf3;font-family:sans-serif">' + step.title + '</text>';

    var ty2 = isExp ? y + 37 : y + BH/2 + 9;
    s += '<text x="' + tx + '" y="' + ty2 + '" dominant-baseline="central"';
    s += ' style="font-size:10px;fill:#8b949e;font-family:sans-serif">' + step.subtitle + '</text>';

    if (isExp) {
      var prod = step.produces.length > 78 ? step.produces.substring(0,78)+'...' : step.produces;
      s += '<text x="' + tx + '" y="' + (y+55) + '" dominant-baseline="central"';
      s += ' style="font-size:10px;fill:' + (isSetup ? '#fac775' : d.colorLight) + ';font-family:sans-serif">&#8594; ' + prod + '</text>';
      s += '<text x="' + tx + '" y="' + (y+72) + '" dominant-baseline="central"';
      s += ' style="font-size:10px;fill:#8b949e;font-family:sans-serif;font-style:italic">' + step.role + '</text>';
    }

    s += '</g>';
  });
  s += '</svg>';
  applyZoomToSvg(s);
}

function applyZoomToSvg(svgHtml) {
  var container = document.getElementById('canvas');
  if (svgHtml !== undefined) container.innerHTML = svgHtml;
  var svg = container.querySelector('svg');
  if (!svg) return;
  if (zoomLevel === 1.0) {
    svg.style.width = '100%'; svg.style.height = 'auto';
  } else {
    var cw = document.getElementById('diagram-scroll').clientWidth - 28;
    svg.style.width = (cw * zoomLevel) + 'px'; svg.style.height = 'auto';
  }
  document.getElementById('zoom-pct').textContent = Math.round(zoomLevel * 100) + '%';
}

function applyZoom(delta) { zoomLevel = Math.max(0.4, Math.min(4.0, zoomLevel + delta)); applyZoomToSvg(); }
function resetZoom() { zoomLevel = 1.0; applyZoomToSvg(); }

document.getElementById('diagram-scroll').addEventListener('wheel', function(e) {
  if (!e.ctrlKey) return;
  e.preventDefault();
  applyZoom(e.deltaY < 0 ? 0.1 : -0.1);
}, {passive:false});

// ─── Detail panel ───
function selectStep(id) {
  var d = DATA[activeTab];
  var step = null;
  for (var i = 0; i < d.steps.length; i++) { if (d.steps[i].id === id) { step = d.steps[i]; break; } }
  if (!step) return;
  selectedId = id;

  var isSetup = id === 's0';
  var badgeColor = isSetup ? '#ba7517' : d.color;
  var badgeBg   = isSetup ? '#2a1500' : d.fillSel;
  var badgeText = isSetup ? '#fac775' : d.colorLight;

  var badge = document.getElementById('det-badge');
  badge.textContent = step.badge + ' — ' + step.role;
  badge.style.cssText = 'background:' + badgeBg + ';color:' + badgeText + ';border:1px solid ' + badgeColor
    + ';display:inline-block;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;margin-bottom:7px';

  document.getElementById('det-title').textContent = step.title;
  document.getElementById('det-sub').textContent = step.subtitle;

  var html = '';
  html += '<div class="dsec"><div class="dsec-title">What happens</div><div class="desc-text">' + step.description + '</div></div>';

  if (step.sample) {
    html += '<div class="dsec"><div class="dsec-title">Worked example</div><div class="sample-box">' + step.sample + '</div></div>';
  }

  if (step.sends && step.sends.length) {
    html += '<div class="dsec"><div class="dsec-title">What is sent</div>';
    step.sends.forEach(function(s) { html += '<div class="dcard out">' + s + '</div>'; });
    html += '</div>';
  }
  if (step.receives && step.receives.length) {
    html += '<div class="dsec"><div class="dsec-title">What is received</div>';
    step.receives.forEach(function(r) { html += '<div class="dcard inp">' + r + '</div>'; });
    html += '</div>';
  }

  html += '<div class="dsec"><div class="dsec-title">Result of this step</div><div class="dcard out">' + step.produces + '</div></div>';

  if (step.note) {
    html += '<div class="dsec"><div class="dsec-title">Key insight</div><div class="dcard note">' + step.note + '</div></div>';
  }

  document.getElementById('det-body').innerHTML = html;
  document.getElementById('det-body').scrollTop = 0;
  renderStepsList();
  renderDiagram();
}

// ─── Steps list ───
function renderStepsList() {
  var d = DATA[activeTab];
  var html = '';
  d.steps.forEach(function(step) {
    var active = selectedId === step.id;
    var isSetup = step.id === 's0';
    var bc = isSetup ? '#ba7517' : d.color;
    html += '<div class="spill' + (active ? ' active' : '') + '" onclick="selectStep(\'' + step.id + '\')">';
    html += '<span class="sbadge" style="background:' + bc + '">' + step.badge + '</span>';
    html += '<span>' + step.title + '</span></div>';
  });
  document.getElementById('steps-list').innerHTML = html;
}

// ─── Tab switch ───
function switchTab(tab) {
  activeTab = tab; selectedId = null;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
  var badge = document.getElementById('det-badge');
  badge.textContent = 'Select a step'; badge.style.cssText = '';
  document.getElementById('det-title').textContent = 'Click any step to explore';
  document.getElementById('det-sub').textContent = tab === 'ssh'
    ? 'Follow Sarah uploading Q3_report.pdf to her company server via SSH'
    : 'Follow Alex buying a book safely on bookshop.com';
  document.getElementById('det-body').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:140px;color:#8b949e;font-size:13px;flex-direction:column;gap:8px"><span style="font-size:22px">&#x1F446;</span><span>Click a step in the diagram</span></div>';
  renderDiagram(); renderStepsList();
}

// ─── Collapse / Expand ───
function setView(mode) {
  viewMode = mode;
  document.getElementById('seg-exp').classList.toggle('active', mode === 'expand');
  document.getElementById('seg-col').classList.toggle('active', mode === 'collapse');
  document.getElementById('toolbar-label').textContent = mode === 'expand' ? 'Detailed' : 'Overview';
  renderDiagram();
}

// ─── Resizer ───
(function(){
  var resizer = document.getElementById('resizer');
  var left    = document.getElementById('diagram-area');
  var dragging = false, startX = 0, startW = 0;
  resizer.addEventListener('mousedown', function(e) {
    dragging = true; startX = e.clientX; startW = left.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cssText = 'cursor:col-resize;user-select:none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var nw = Math.max(280, Math.min(window.innerWidth - 310, startW + e.clientX - startX));
    left.style.flex = '0 0 ' + nw + 'px';
    applyZoomToSvg();
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false; resizer.classList.remove('dragging');
    document.body.style.cssText = '';
  });
})();

window.addEventListener('resize', function() { applyZoomToSvg(); });

// ─── Images ───
function toggleImgs() {
  imgExpanded = !imgExpanded;
  document.getElementById('img-area').style.display = imgExpanded ? 'block' : 'none';
}
function addImgs(input) {
  var gallery = document.getElementById('img-gallery');
  Array.from(input.files).forEach(function(file) {
    var url = URL.createObjectURL(file);
    var img = document.createElement('img');
    img.src = url; img.title = file.name;
    img.onclick = function() { window.open(url, '_blank'); };
    gallery.appendChild(img);
  });
  input.value = '';
}

// ─── Init ───
renderDiagram();
renderStepsList();
</script>
