<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Integration Suite Deep Dive — Interactive</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;overflow:hidden}

/* ── Diagram panel ── */
#diagram-area{flex:0 0 55%;min-width:280px;height:100vh;overflow:hidden;background:#0d1117;border-right:1px solid #21262d;display:flex;flex-direction:column}
#diagram-toolbar{flex-shrink:0;display:flex;align-items:center;padding:5px 10px;background:#0d1117;border-bottom:1px solid #21262d;gap:8px}
.tb-pill{display:inline-flex;align-items:center;border:1px solid #30363d;border-radius:5px;overflow:hidden;background:#161b22}
.tb-btn{background:none;border:none;color:#6e7681;cursor:pointer;padding:4px 11px;font-size:15px;line-height:1.4}
.tb-btn:hover{background:#21262d;color:#e6edf3}
.tb-btn.active{background:#0a2a1e;color:#4fc98f}
.tb-sep{font-size:10px;color:#6e7681;padding:3px 9px;border-left:1px solid #30363d;border-right:1px solid #30363d;white-space:nowrap}
.collapsed .sub-box{display:none}
#diagram-scroll{flex:1;min-height:0;overflow:auto}
#diagram-scroll svg{display:block;width:100%;height:auto}
#diagram-scroll::-webkit-scrollbar{width:7px;height:7px}
#diagram-scroll::-webkit-scrollbar-track{background:#161b22;border-radius:3px}
#diagram-scroll::-webkit-scrollbar-thumb{border-radius:3px}
#diagram-scroll::-webkit-scrollbar-thumb:vertical{background:#1d6e5a}
#diagram-scroll::-webkit-scrollbar-thumb:vertical:hover{background:#1d9e75}
#diagram-scroll::-webkit-scrollbar-thumb:horizontal{background:#185fa5}
#diagram-scroll::-webkit-scrollbar-thumb:horizontal:hover{background:#378add}
#diagram-scroll::-webkit-scrollbar-corner{background:#161b22}
/* resizer */
#resizer{flex:0 0 5px;background:#21262d;cursor:col-resize;transition:background .2s;z-index:10;flex-shrink:0}
#resizer:hover,#resizer.dragging{background:#378add}

/* ── Detail panel ── */
#detail-panel{flex:1;display:flex;flex-direction:column;background:#161b22;overflow:hidden;min-width:280px}
#detail-header{padding:16px 20px 12px;border-bottom:1px solid #30363d;flex-shrink:0}
#detail-title{font-size:16px;font-weight:700;color:#e6edf3;margin-bottom:4px}
#detail-subtitle{font-size:11px;color:#6e7681}

/* ── Flow sequence strip ── */
#strip-wrap{padding:12px 20px;border-bottom:1px solid #30363d;overflow-x:auto;flex-shrink:0;background:#0d1117}
#strip-wrap::-webkit-scrollbar{height:4px}
#strip-wrap::-webkit-scrollbar-track{background:#0d1117;border-radius:2px}
#strip-wrap::-webkit-scrollbar-thumb{background:#ba7517;border-radius:2px}
#strip-wrap::-webkit-scrollbar-thumb:hover{background:#f0a442}
.strip-row{display:flex;align-items:center;gap:0;white-space:nowrap;margin-bottom:6px}
.strip-label{font-size:9px;color:#6e7681;font-weight:600;text-transform:uppercase;letter-spacing:.5px;min-width:55px;flex-shrink:0}
.s-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:4px;font-size:10px;color:#6e7681;background:#1f2937;border:1px solid #30363d;cursor:pointer;transition:none;white-space:nowrap}
.s-pill.t-active{background:#0a2a1e;border-color:#1d9e75;color:#4fc98f;font-weight:600}
.s-pill.d-active{background:#2a1500;border-color:#ba7517;color:#f0a442;font-weight:600}
.s-pill .step-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;color:white}
.s-pill.t-active .step-badge{background:#0f6e56}
.s-pill.d-active .step-badge{background:#ba7517}
.s-pill:not(.t-active):not(.d-active) .step-badge{background:#30363d}
.s-arrow{color:#30363d;padding:0 3px;font-size:10px}

/* ── Detail body ── */
#detail-body{padding:14px 20px;overflow-y:auto;overflow-x:auto;flex:1}
#detail-body::-webkit-scrollbar{width:5px}
#detail-body::-webkit-scrollbar-track{background:#161b22;border-radius:2px}
#detail-body::-webkit-scrollbar-thumb{background:#4a9ee6;border-radius:2px}
#detail-body::-webkit-scrollbar-thumb:hover{background:#7ba7ff}
.desc-box{font-size:12.5px;color:#8b949e;line-height:1.65;padding:11px 13px;background:#0d1117;border-radius:6px;margin-bottom:14px;border:1px solid #21262d}
.section-label{font-size:10px;font-weight:600;color:#6e7681;text-transform:uppercase;letter-spacing:.7px;margin:14px 0 7px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:#21262d}
.conn-row{display:flex;gap:10px;margin-bottom:8px;padding:10px 12px;border-radius:6px;border-left:3px solid #30363d;background:#0d1117;min-width:460px}
.conn-row.calls{border-left-color:#1d9e75}
.conn-row.calledby{border-left-color:#185fa5}
.conn-target{font-size:11.5px;font-weight:600;color:#e6edf3;min-width:160px;line-height:1.45;flex-shrink:0}
.conn-reason{font-size:11.5px;color:#8b949e;line-height:1.55}
.no-conn{font-size:12px;color:#6e7681;padding:3px 0}
#placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6e7681;font-size:13px;gap:10px;text-align:center;line-height:1.8}

/* ── SVG clickable groups ── */
.cbox{cursor:pointer}
.cbox:hover>rect:first-of-type,.cbox:hover>rect:first-child{opacity:.82}
.cbox.active>rect:first-of-type,.cbox.active>rect:first-child{stroke-width:2.8px!important}
</style>
</head>

    const cls=isActive?(kind==='T'?'s-pill t-active':'s-pill d-active'):'s-pill';
    h+=`<span class="${cls}" onclick="show('${s.id}')"><span class="step-badge">${s.step}</span>${s.label}</span>`;
    if(i<flow.length-1) h+=`<span class="s-arrow">›</span>`;
  });
  return h;
}

function show(id){
  const d=D[id]; if(!d) return;

  /* highlight box */
  if(activeEl) activeEl.querySelectorAll('.cbox').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll(`[onclick="show('${id}')"]`).forEach(el=>{
    el.classList.add('active');
    activeEl=el.closest('svg') || el;
  });

  /* show panel */
  document.getElementById('placeholder').style.display='none';
  const dc=document.getElementById('detail-content');
  dc.style.display='flex'; dc.style.flexDirection='column'; dc.style.overflow='hidden'; dc.style.flex='1';

  document.getElementById('detail-title').textContent=d.title;
  document.getElementById('detail-subtitle').textContent=d.sub||'';
  document.getElementById('detail-desc').textContent=d.desc;

  /* strips */
  document.getElementById('trigger-strip-row').innerHTML=
    '<span class="strip-label">Trigger</span>'+buildStrip(TFLOW,id,'T');
  document.getElementById('deploy-strip-row').innerHTML=
    '<span class="strip-label">Deploy</span>'+buildStrip(DFLOW,id,'D');

  /* calls */
  const cl=document.getElementById('calls-list'); cl.innerHTML='';
  if(!d.calls||d.calls.length===0){
    cl.innerHTML='<p class="no-conn">No outbound calls from this component</p>';
  } else {
    d.calls.forEach(c=>{
      cl.innerHTML+=`<div class="conn-row calls"><div class="conn-target">→ ${c.t}</div><div class="conn-reason">${c.r}</div></div>`;
    });
  }

  /* called-by */
  const cb=document.getElementById('calledby-list'); cb.innerHTML='';
  if(!d.calledBy||d.calledBy.length===0){
    cb.innerHTML='<p class="no-conn">Nothing calls this component directly</p>';
  } else {
    d.calledBy.forEach(c=>{
      cb.innerHTML+=`<div class="conn-row calledby"><div class="conn-target">← ${c.t}</div><div class="conn-reason">${c.r}</div></div>`;
    });
  }
}

/* ── Collapse / Expand toggle ── */
(function(){
  const svgEl = document.querySelector('#diagram-scroll svg');
  const btnExpand  = document.getElementById('btn-expand');
  const btnCollapse= document.getElementById('btn-collapse');
  const tbLabel    = document.getElementById('tb-label');

  function setCollapsed(yes){
    if(yes){
      svgEl.classList.add('collapsed');
      btnExpand.classList.add('active');    // ← active in Overview
      btnCollapse.classList.remove('active');
      tbLabel.textContent='Overview';
    } else {
      svgEl.classList.remove('collapsed');
      btnCollapse.classList.add('active');  // → active in Detailed
      btnExpand.classList.remove('active');
      tbLabel.textContent='Detailed';
    }
  }

  setCollapsed(true); // start in Overview
  btnExpand.addEventListener('click',  ()=>setCollapsed(true));   // ← = Overview
  btnCollapse.addEventListener('click', ()=>setCollapsed(false));  // → = Detailed
})();

/* ── Resizable panels ── */
(function(){
  const resizer = document.getElementById('resizer');
  const diagramArea = document.getElementById('diagram-area');
  let isResizing = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', e => {
    isResizing = true;
    startX = e.clientX;
    startW = diagramArea.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isResizing) return;
    const newW = Math.max(280, Math.min(startW + (e.clientX - startX), window.innerWidth - 310));
    diagramArea.style.flex = `0 0 ${newW}px`;
  });
  document.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

/* ── Zoom ── */
let zoomLevel = 1;
const diagramScroll = document.getElementById('diagram-scroll');
const svgEl = diagramScroll.querySelector('svg');

function applyZoom(z) {
  zoomLevel = Math.max(0.4, Math.min(4, z));
  if (zoomLevel <= 1) {
    zoomLevel = 1;
    svgEl.style.width = '100%';
    svgEl.style.height = 'auto';
  } else {
    const fitW = diagramScroll.clientWidth;
    svgEl.style.width = Math.round(fitW * zoomLevel) + 'px';
    svgEl.style.height = 'auto';
  }
  const zv = document.getElementById('zoom-val'); if(zv) zv.textContent = Math.round(zoomLevel * 100) + '%';
}

diagramScroll.addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  applyZoom(zoomLevel + (e.deltaY < 0 ? 0.1 : -0.1));
}, { passive: false });
</script>
